<!DOCTYPE html>
<html>

<head>

<title>Registrar ocorrência</title>

<link rel="stylesheet" href="./style.css">

</head>

<body>

<main>  
<h2>Registrar ocorrência</h2>

<form class="formulario">
<label>Endereço</label>

<input type="text" id="endereco" placeholder="Digite o endereço">

<label>Tipo de problema</label>

<select id="tipo">

<option>Buraco na rua</option>
<option>Poste sem iluminação</option>
<option>Lixo acumulado</option>
<option>Alagamento</option>

</select>

<label>Foto</label>

<input type="file" id="foto" accept="image/*">
<img id="preview" width="300">
<p id="resultado"></p>


<button onclick="salvar()">Salvar</button>
</form>



</main>
</body>
<script src="reportar.js"></script>
</html>
